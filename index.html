<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraFit 换装工作流</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background-color: #0B0F19;
      color: #e5e7eb;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useRef, useEffect } = React;
    const { UploadCloud, Image: ImageIcon, Wand2, Key, History, Search, Loader2, Play } = lucideReact;




const App = () => {
  // --- 状态管理 ---
  const [apiKey, setApiKey] = useState('');
  const [prompt, setPrompt] = useState('让图1中的女模特穿上图2的上衣，需确保衣服的一致性');
  const [resolution, setResolution] = useState('2K');
  
  // 图片上传状态
  const [images, setImages] = useState({
    model: null,
    top: null,
    bottom: null,
  });

  // 任务状态：idle, generating, success, error
  const [status, setStatus] = useState('idle');
  const [progress, setProgress] = useState(0); // 真实的进度 0-100
  const [elapsedTime, setElapsedTime] = useState(0); // 计时器
  const [resultImage, setResultImage] = useState(null);
  const [history, setHistory] = useState([]);

  // --- 计时器逻辑 ---
  useEffect(() => {
    let timer;
    if (status === 'generating') {
      timer = setInterval(() => {
        setElapsedTime((prev) => prev + 1);
      }, 1000);
    } else {
      clearInterval(timer);
    }
    return () => clearInterval(timer);
  }, [status]);

  // --- 格式化时间 ---
  const formatTime = (seconds) => {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  };

  // --- 处理图片上传 ---
  const handleImageUpload = (type, e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setImages(prev => ({ ...prev, [type]: reader.result }));
      };
      reader.readAsDataURL(file);
    }
  };

  // --- 辅助函数：将 Base64 转换为 Blob ---
  const dataURLtoBlob = (dataurl) => {
    const arr = dataurl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) {
      u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], { type: mime });
  };

  // --- 辅助函数：上传图片 ---
  const uploadImage = async (base64) => {
    const blob = dataURLtoBlob(base64);
    const formData = new FormData();
    formData.append('file', blob, 'image.png');

    const response = await fetch('https://www.runninghub.cn/openapi/v2/media/upload/binary', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`
      },
      body: formData
    });

    const result = await response.json();
    if (result.code !== 0) throw new Error(result.message || '上传图片失败');
    return result.data.fileName;
  };

  // --- 触发生成 (对接 RunningHub App API) ---
  const handleGenerate = async () => {
    // 使用用户提供的 API Key
    const finalApiKey = apiKey;
    
    if (!finalApiKey) return alert("请在页面上方输入 API Key");
    
    if (!images.model) return alert("请上传模特原图");
    if (!images.top) return alert("请上传上衣图片");

    setStatus('generating');
    setProgress(0);
    setElapsedTime(0);
    setResultImage(null);

    try {
      // 1. 上传图片获取内部地址 (根据 API 文档，资源文件支持上传接口返回的 fileName)
      console.log('正在上传图片...');
      const modelFileName = await uploadImage(images.model);
      const topFileName = await uploadImage(images.top);

      // 2. 提交应用工作流请求
      const nodeInfoList = [
        { nodeId: "4", fieldName: "image", fieldValue: modelFileName },
        { nodeId: "11", fieldName: "image", fieldValue: topFileName },
        { nodeId: "12", fieldName: "text", fieldValue: prompt }
      ];

      const payload = {
        addMetadata: true,
        nodeInfoList: nodeInfoList,
        instanceType: "default",
        usePersonalQueue: false
      };

      const promptResponse = await fetch('https://www.runninghub.cn/openapi/v2/run/workflow/2033182322152972289', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${finalApiKey}`
        },
        body: JSON.stringify(payload)
      });

      const promptResult = await promptResponse.json();
      
      // 判断接口是否返回成功并且有任务 ID
      const taskId = promptResult.taskId || promptResult.data?.taskId;
      if (!taskId) {
        throw new Error(promptResult.errorMessage || promptResult.msg || '提交任务失败，请检查参数或API状态');
      }

      // 3. 轮询进度与查询结果
      const poll = setInterval(async () => {
        try {
          const queryResponse = await fetch('https://www.runninghub.cn/openapi/v2/query', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${finalApiKey}`
            },
            body: JSON.stringify({ taskId })
          });

          const queryResult = await queryResponse.json();
          const status = queryResult.status || queryResult.data?.status;
          
          if (status === 'SUCCESS') {
            clearInterval(poll);
            // 提取结果图片 URL
            const finalImg = queryResult.results?.[0]?.url || queryResult.data?.results?.[0]?.url;
            if (finalImg) {
              setResultImage(finalImg);
              setStatus('success');
              setHistory(prev => [{ img: finalImg, time: formatTime(elapsedTime), prompt }, ...prev]);
              setProgress(100);
            } else {
              setStatus('error');
              alert('生成成功，但未解析到图片 URL');
            }
          } else if (status === 'FAILED') {
            clearInterval(poll);
            setStatus('error');
            alert(`生成失败: ${queryResult.errorMessage || queryResult.data?.errorMessage || '未知错误'}`);
          } else {
            // 更新进度
            if (status === 'RUNNING') {
              setProgress(prev => Math.min(prev + (100 - prev) * 0.1, 95));
            } else if (status === 'QUEUED') {
              setProgress(5);
            }
          }
        } catch (err) {
          console.error('轮询出错:', err);
        }
      }, 2000);

    } catch (error) {
      console.error('流程出错:', error);
      alert(`操作失败: ${error.message}`);
      setStatus('error');
    }
  };
  // --- UI 组件：暗黑风格上传框 ---
  const UploadBox = ({ type, title, subtitle, className = "" }) => {
    const inputRef = useRef(null);
    const imageSrc = images[type];

    return (
      <div 
        onClick={() => inputRef.current?.click()}
        className={`relative flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all duration-300 overflow-hidden group
          ${imageSrc ? 'border border-gray-700 bg-[#1A1D2B]' : 'border border-dashed border-gray-600 hover:border-purple-500 bg-[#151825] hover:bg-[#1A1D2B]'} 
          ${className}`}
      >
        {imageSrc ? (
          <>
            <img src={imageSrc} alt={title} className="object-contain w-full h-full p-2 opacity-80 group-hover:opacity-100 transition-opacity" />
            <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
              <span className="text-white text-sm font-medium">点击更换</span>
            </div>
          </>
        ) : (
          <div className="flex flex-col items-center p-4">
            <UploadCloud className="w-6 h-6 text-purple-500 mb-2 group-hover:-translate-y-1 transition-transform" />
            <span className="text-sm text-gray-300 mb-1">{title}</span>
            <span className="text-xs text-gray-500">{subtitle}</span>
          </div>
        )}
        <input type="file" ref={inputRef} onChange={(e) => handleImageUpload(type, e)} accept="image/*" className="hidden" />
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-[#0B0F19] text-gray-200 font-sans p-6">
      
      {/* 顶部 Header */}
      <header className="max-w-[1600px] mx-auto flex items-center justify-between mb-6">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-900/50">
            <Wand2 className="w-5 h-5 text-white" />
          </div>
          <div>
            <h1 className="text-xl font-bold tracking-wide text-white">AuraFit API</h1>
            <p className="text-xs text-gray-400">专业级图生图换装引擎控制台</p>
          </div>
        </div>
        
        {/* API Key 输入框 */}
        <div className="flex items-center gap-2 bg-[#151825] px-4 py-2.5 rounded-full border border-gray-700 focus-within:border-purple-500 transition-colors w-80">
          <Key className="w-4 h-4 text-gray-500" />
          <input 
            type="password" 
            placeholder="输入你的 RunningHub API Key..." 
            value={apiKey}
            onChange={(e) => setApiKey(e.target.value)}
            className="bg-transparent border-none outline-none text-sm w-full text-gray-200 placeholder-gray-600"
          />
        </div>
      </header>

      {/* 主体两列布局 */}
      <main className="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        {/* 左侧控制栏 */}
        <section className="lg:col-span-4 flex flex-col gap-6">
          
          {/* 生成参数设置卡片 */}
          <div className="bg-[#111420] p-5 rounded-2xl border border-gray-800 shadow-xl">
            <h2 className="text-sm font-semibold text-purple-400 flex items-center gap-2 mb-5">
              <span className="w-1.5 h-1.5 rounded-full bg-purple-500"></span>
              生成参数设置
            </h2>
            
            <div className="space-y-4">
              {/* Prompt */}
              <div>
                <label className="block text-xs text-gray-400 mb-1.5">场景提示词 (Prompt)</label>
                <textarea 
                  rows="3"
                  value={prompt}
                  onChange={(e) => setPrompt(e.target.value)}
                  placeholder="输入提示词..."
                  className="w-full bg-[#1A1D2B] border border-gray-700 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-purple-500 transition-colors resize-none"
                ></textarea>
              </div>

              {/* Resolution */}
              <div>
                <label className="block text-xs text-gray-400 mb-1.5">输出分辨率</label>
                <div className="flex gap-2">
                  {['1K', '2K', '4K', '8K'].map((res) => (
                    <button
                      key={res}
                      onClick={() => setResolution(res)}
                      className={`flex-1 py-2 text-xs font-medium rounded-lg border transition-all ${
                        resolution === res 
                          ? 'bg-purple-600 border-purple-500 text-white shadow-lg shadow-purple-900/30' 
                          : 'bg-[#1A1D2B] border-gray-700 text-gray-400 hover:border-gray-500'
                      }`}
                    >
                      {res}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* 素材上传卡片 */}
          <div className="bg-[#111420] p-5 rounded-2xl border border-gray-800 shadow-xl">
            <h2 className="text-sm font-semibold text-purple-400 flex items-center gap-2 mb-5">
              <span className="w-1.5 h-1.5 rounded-full bg-purple-500"></span>
              素材图片上传
            </h2>
            
            <div className="space-y-4">
              <div>
                <label className="block text-xs text-gray-400 mb-1.5">模特原图</label>
                <UploadBox type="model" title="点击或拖拽上传" subtitle="支持 PNG, JPG" className="h-32 w-full" />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs text-gray-400 mb-1.5">上衣照片</label>
                  <UploadBox type="top" title="点击或拖拽上传" subtitle="支持 PNG, JPG" className="h-28 w-full" />
                </div>
                <div>
                  <label className="block text-xs text-gray-400 mb-1.5">裤子图片 (可选)</label>
                  <UploadBox type="bottom" title="点击或拖拽上传" subtitle="支持 PNG, JPG" className="h-28 w-full" />
                </div>
              </div>
            </div>
          </div>

          {/* 生成按钮 */}
          <button 
            onClick={handleGenerate}
            disabled={status === 'generating'}
            className={`w-full py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all border
              ${status === 'generating' 
                ? 'bg-purple-900/50 border-purple-800 text-purple-300 cursor-not-allowed' 
                : 'bg-gradient-to-r from-purple-700 to-indigo-700 border-purple-500 hover:from-purple-600 hover:to-indigo-600 shadow-[0_0_20px_rgba(124,58,237,0.3)] text-white hover:shadow-[0_0_30px_rgba(124,58,237,0.5)]'
              }`}
          >
            {status === 'generating' ? (
              <><Loader2 className="w-4 h-4 animate-spin" /> 正在调用 RunningHub 节点...</>
            ) : (
              <><Play className="w-4 h-4 fill-current" /> 开始生成换装图</>
            )}
          </button>
        </section>

        {/* 右侧预览区 */}
        <section className="lg:col-span-8 flex flex-col gap-6">
          <div className="bg-[#111420] p-6 rounded-2xl border border-gray-800 shadow-xl flex-1 flex flex-col min-h-[600px]">
            <h2 className="text-sm font-semibold text-gray-300 flex items-center gap-2 mb-4">
              <Search className="w-4 h-4" />
              虚拟试衣预览
            </h2>
            
            <div className="flex-1 bg-[#151825] border border-gray-800 rounded-xl flex items-center justify-center overflow-hidden relative">
              
              {/* 空状态 */}
              {status === 'idle' && !resultImage && (
                <div className="text-center flex flex-col items-center">
                  <Wand2 className="w-10 h-10 text-gray-600 mb-3" />
                  <p className="text-gray-500 text-sm">配置参数并点击生成以预览结果</p>
                </div>
              )}

              {/* 真实的进度条状态显示区 */}
              {status === 'generating' && (
                <div className="w-full max-w-md px-8 text-center flex flex-col items-center z-10">
                  <div className="w-16 h-16 border-4 border-gray-800 border-t-purple-500 rounded-full animate-spin mb-6"></div>
                  
                  <h3 className="text-lg font-medium text-white mb-2">正在通过 API 渲染图像</h3>
                  <p className="text-sm text-gray-400 mb-6">已耗时: <span className="text-purple-400 font-mono">{formatTime(elapsedTime)}</span></p>
                  
                  {/* 进度条外框 */}
                  <div className="w-full h-2 bg-gray-800 rounded-full overflow-hidden shadow-inner">
                    {/* 进度条填充 */}
                    <div 
                      className="h-full bg-gradient-to-r from-purple-600 to-indigo-500 transition-all duration-500 ease-out relative"
                      style={{ width: `${progress}%` }}
                    >
                      <div className="absolute top-0 right-0 bottom-0 left-0 bg-white/20 animate-pulse"></div>
                    </div>
                  </div>
                  
                  <div className="flex justify-between w-full mt-2 text-xs text-gray-500 font-mono">
                    <span>处理节点...</span>
                    <span>{progress}%</span>
                  </div>
                </div>
              )}

              {/* 结果显示 */}
              {status === 'success' && resultImage && (
                <img src={resultImage} alt="Result" className="w-full h-full object-contain animate-in fade-in duration-500" />
              )}
            </div>
          </div>
        </section>

      </main>

      {/* 底部历史记录区 */}
      <footer className="max-w-[1600px] mx-auto mt-6">
        <div className="bg-[#111420] p-5 rounded-2xl border border-gray-800 shadow-xl min-h-[160px]">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-sm font-semibold text-gray-300 flex items-center gap-2">
              <History className="w-4 h-4 text-purple-500" />
              最近生成记录
            </h2>
            <span className="text-xs text-gray-500">本地缓存 {history.length} 个结果</span>
          </div>
          
          {history.length === 0 ? (
            <div className="flex items-center justify-center h-20">
              <span className="text-sm text-gray-600">暂无生成记录</span>
            </div>
          ) : (
            <div className="flex gap-4 overflow-x-auto pb-2">
              {history.map((item, idx) => (
                <div key={idx} className="relative group w-24 h-24 flex-shrink-0 border border-gray-700 rounded-lg overflow-hidden">
                  <img src={item.img} alt={`History ${idx}`} className="w-full h-full object-cover" />
                  <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-[10px] text-white p-1 text-center">
                    {item.time}s
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </footer>
    </div>
  );
};



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
